<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCook | Crear Cuenta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4eee1; display: flex; justify-content: center; align-items: center; height: 100vh;">
    
    <div class="login-card">
        <img src="logosolitario.png" alt="SafeCook Logo" class="login-logo" style="width: 120px; height: 120px; margin-bottom: 20px;">
        
        <h2 style="font-size: 1.8rem;">Nueva Cuenta</h2>
        <p>Regístrate para acceder a SafeCook PRO</p>

        <form onsubmit="event.preventDefault(); registro()">
            <div id="alerta" style="margin-bottom: 15px; font-weight: bold; color: #ef4444;"></div>
            
            <div class="login-input">
                <i class="fa-solid fa-user-tag"></i>
                <input type="text" id="inputNombre" placeholder="Tu nombre completo" required autofocus>
            </div>
            <div class="login-input">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="inputEmail" placeholder="Correo electrónico" required>
            </div>
            <div class="login-input">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="inputPassword" placeholder="Contraseña (Mín. 6 caracteres)" required>
            </div>
            
            <button type="submit" class="login-button" id="btnRegistro" style="background-color: #10b981; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);">
                REGISTRARME <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>
        
        <p style="margin-top: 20px; font-size: 0.9rem; color: #64748b;">
            ¿Ya tienes cuenta? <a href="login.html" style="color: #2d5a27; font-weight: bold;">Inicia sesión aquí</a>
        </p>
    </div>

    <script src="js/registro.js"></script>
</body>
</html>
